<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paper Trading Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 18px; font-weight: 600; color: var(--blue); }
  #refresh-info { color: var(--muted); font-size: 12px; }
  #last-updated { color: var(--text); }

  main { padding: 12px 24px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Strategy cards ── */
  .strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 10px; }

  .strategy-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .strategy-card.has-position { border-color: var(--yellow); }

  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); }
  .strategy-name { font-weight: 700; font-size: 15px; text-transform: capitalize; }
  .card-meta { display: flex; gap: 12px; align-items: center; }
  .total-cap { font-size: 18px; font-weight: 700; }
  .total-ret { font-size: 13px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .pos { color: var(--green); background: rgba(63,185,80,.12); }
  .neg { color: var(--red); background: rgba(248,81,73,.12); }
  .zero { color: var(--muted); background: rgba(125,133,144,.1); }

  .card-body { padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }

  /* coin rows */
  .coin-table { width: 100%; border-collapse: collapse; }
  .coin-table th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; padding: 4px 6px; text-align: right; }
  .coin-table th:first-child { text-align: left; }
  .coin-table td { padding: 5px 6px; text-align: right; border-top: 1px solid var(--border); }
  .coin-table td:first-child { text-align: left; font-weight: 600; }
  .coin-name { display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 700; text-transform: uppercase; }
  .badge-long  { background: rgba(63,185,80,.2); color: var(--green); }
  .badge-short { background: rgba(248,81,73,.2); color: var(--red); }
  .badge-flat  { background: rgba(125,133,144,.15); color: var(--muted); }

  /* cycle info */
  .cycle-info { display: flex; gap: 16px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .cycle-info span { display: flex; gap: 4px; }
  .cycle-info b { color: var(--text); }

  /* signals */
  .signals-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .sig-chip { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(88,166,255,.1); color: var(--blue); border: 1px solid rgba(88,166,255,.2); }

  /* ── Trades panel ── */
  .trades-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .strategy-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; transition: all .15s; }
  .tab:hover { border-color: var(--blue); color: var(--blue); }
  .tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

  .trades-table-wrap { overflow-x: auto; }
  table.trades { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.trades th { color: var(--muted); font-weight: 500; text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.trades td { padding: 6px 10px; border-bottom: 1px solid rgba(48,54,61,.6); white-space: nowrap; }
  table.trades tr:hover td { background: rgba(255,255,255,.03); }
  .pnl-pos { color: var(--green); font-weight: 600; }
  .pnl-neg { color: var(--red); font-weight: 600; }
  .empty-msg { color: var(--muted); padding: 20px 0; text-align: center; }

  /* ── Overview bar ── */
  .overview-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 20px;
  }
  .ov-item { display: flex; flex-direction: column; gap: 3px; min-width: 110px; }
  .ov-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .ov-value { font-size: 18px; font-weight: 700; }
  .ov-sub   { font-size: 11px; color: var(--muted); }
  .ov-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }

  /* responsive */
  @media (max-width: 600px) {
    .strategy-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 8px; align-items: flex-start; }
    .ov-divider { display: none; }
  }

  /* ── Main layout ── */
  .main-col { display: flex; flex-direction: column; gap: 12px; }

  /* ── Drawer toggle button ── */
  .drawer-btn {
    position: fixed; right: 0; top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    writing-mode: vertical-rl; text-orientation: mixed;
    padding: 14px 8px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px 0 0 8px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; user-select: none;
    box-shadow: -2px 0 12px rgba(0,0,0,.4);
    transition: background .15s, right .3s;
  }
  .drawer-btn:hover { background: #3b8ae0; }
  .drawer-btn.open  { right: 420px; }

  /* ── Overlay backdrop ── */
  .drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 210;
    background: rgba(0,0,0,.45);
  }
  .drawer-overlay.visible { display: block; }

  /* ── Drawer panel ── */
  .sidebar {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 420px; z-index: 220;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    background: var(--card); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 { font-size: 14px; font-weight: 600; }
  .sidebar-close {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px;
  }
  .sidebar-close:hover { background: rgba(255,255,255,.07); color: var(--text); }
  .sidebar-tabs { padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar .strategy-tabs { margin-bottom: 0; }
  .sidebar-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .sidebar .trades-table-wrap { overflow-x: auto; }
  .sidebar table.trades { font-size: 11px; }
  .sidebar table.trades th, .sidebar table.trades td { padding: 4px 7px; }

  /* ── Trade cards ── */
  .trade-list { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; }
  .trade-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .trade-card-top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .trade-card-coin { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .trade-card-pnl  { font-size: 14px; font-weight: 700; }
  .trade-card-meta {
    display: flex; flex-wrap: wrap; gap: 6px 14px;
    font-size: 11px; color: var(--muted);
  }
  .trade-card-meta span b { color: var(--text); font-weight: 600; }
  .trade-card-time { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── Chart coin tabs ── */
  .chart-coin-tabs {
    display: flex; gap: 4px; padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }
  .chart-tab {
    padding: 4px 14px; border-radius: 16px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600;
    transition: all .15s;
  }
  .chart-tab:hover { border-color: var(--blue); color: var(--blue); }
  .chart-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* ── BTC 1H Chart ── */
  .chart-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden;
  }
  .chart-header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .chart-title { font-weight: 700; font-size: 15px; color: var(--blue); }
  .chart-price-change { font-size: 12px; font-weight: 600; }
  .chart-price { font-size: 18px; font-weight: 700; }
  .chart-meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); }
  .chart-meta b { color: var(--text); }
  #btc-chart-container { width: 100%; }

  @media (max-width: 600px) {
    .sidebar { width: 100%; }
    .drawer-btn.open { right: 100%; }
  }
</style>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <img src="/Logo.png" alt="logo" style="height:52px;width:52px;object-fit:contain;" />
    <h1>Paper Trading Dashboard</h1>
  </div>
  <div id="refresh-info">Prices refresh every 10s &middot; Last updated: <span id="last-updated">—</span></div>
</header>

<main>
  <!-- ── Overview bar ── -->
  <div class="overview-bar" id="overview-bar">
    <div class="ov-item">
      <div class="ov-label">Total Capital</div>
      <div class="ov-value" id="ov-capital">—</div>
      <div class="ov-sub" id="ov-capital-sub"></div>
    </div>
    <div class="ov-divider"></div>
    <div class="ov-item">
      <div class="ov-label">Realised PnL</div>
      <div class="ov-value" id="ov-realized">—</div>
      <div class="ov-sub" id="ov-realized-sub"></div>
    </div>
    <div class="ov-divider"></div>
    <div class="ov-item">
      <div class="ov-label">Unrealised PnL</div>
      <div class="ov-value" id="ov-unrealized">—</div>
      <div class="ov-sub" id="ov-unrealized-sub"></div>
    </div>
    <div class="ov-divider"></div>
    <div class="ov-item">
      <div class="ov-label">Combined Return</div>
      <div class="ov-value" id="ov-return">—</div>
      <div class="ov-sub" id="ov-return-sub"></div>
    </div>
    <div class="ov-divider"></div>
    <div class="ov-item">
      <div class="ov-label">Open Positions</div>
      <div class="ov-value" id="ov-pos">—</div>
      <div class="ov-sub">/ 12 slots</div>
    </div>
    <div class="ov-divider"></div>
    <div class="ov-item">
      <div class="ov-label">Total Trades</div>
      <div class="ov-value" id="ov-trades">—</div>
      <div class="ov-sub" id="ov-winrate"></div>
    </div>
  </div>

  <div class="main-col">
    <div class="strategy-grid" id="strategy-grid">
      <div style="color:var(--muted);padding:40px 0;text-align:center;grid-column:1/-1">Loading…</div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="chart-title" id="chart-title">BTC / USDT &middot; 1H</span>
          <span class="chart-price-change" id="chart-change"></span>
        </div>
        <div class="chart-meta">
          <span>O <b id="chart-open">—</b></span>
          <span>H <b id="chart-high">—</b></span>
          <span>L <b id="chart-low">—</b></span>
          <span>C <b id="chart-close">—</b></span>
        </div>
        <span class="chart-price" id="chart-live-price">—</span>
      </div>
      <div class="chart-coin-tabs" id="chart-coin-tabs">
        <button class="chart-tab active" data-coin="btc">BTC</button>
        <button class="chart-tab" data-coin="eth">ETH</button>
        <button class="chart-tab" data-coin="sol">SOL</button>
        <button class="chart-tab" data-coin="hype">HYPE</button>
      </div>
      <div id="btc-chart-container"></div>
    </div>
  </div>
</main>

<!-- ── Trades drawer ── -->
<button class="drawer-btn" id="drawer-btn" onclick="toggleDrawer()">Trades</button>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<aside class="sidebar" id="trades-drawer">
  <div class="sidebar-header">
    <h2>Trade History</h2>
    <button class="sidebar-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="sidebar-tabs">
    <div class="strategy-tabs" id="trade-tabs"></div>
  </div>
  <div class="sidebar-body">
    <div class="trades-table-wrap" id="trades-body">
      <p class="empty-msg">Loading…</p>
    </div>
  </div>
</aside>

<script>
const STRATEGIES = ["breakout", "calmar", "regime"];
const COINS      = ["btc", "eth", "sol", "hype"];
const COIN_COLORS = { btc: "#f7931a", eth: "#627eea", sol: "#9945ff", hype: "#00d4aa" };

let activeTab = "breakout";
let summaryCache = {};
let pricesCache  = {};
let lastCycleKey = "";  // track last seen cycle timestamps to detect new cycles
let _chart = null, _candleSeries = null, _volSeries = null, _priceLines = [];
let _activeChartCoin = 'btc';
const INITIAL_CAP_PER_COIN = 10000;
const TOTAL_INITIAL = 3 * 4 * INITIAL_CAP_PER_COIN; // 3 strategies × 4 coins

/* ── Overview ── */
function computeOverview(summaryData, prices) {
  let totalCurrent = 0, totalUnrealized = 0, openPos = 0;
  let totalTrades = 0, totalWins = 0;
  STRATEGIES.forEach(strat => {
    const s = summaryData[strat];
    if (!s) return;
    COINS.forEach(coin => {
      const c = s.coins[coin] || {};
      totalCurrent += c.capital ?? INITIAL_CAP_PER_COIN;
      const cur = prices[coin];
      if (cur && c.entry_price && c.direction && c.notional) {
        const chg = (cur - c.entry_price) / c.entry_price;
        totalUnrealized += c.notional * chg * (c.direction === "long" ? 1 : -1);
      }
      if (c.direction) openPos++;
      totalTrades += c.total_trades || 0;
      if (c.win_rate != null && c.total_trades) totalWins += c.win_rate / 100 * (c.total_trades || 0);
    });
  });
  const realized   = totalCurrent - TOTAL_INITIAL;
  const combined   = realized + totalUnrealized;
  const returnPct  = combined / TOTAL_INITIAL * 100;
  const realPct    = realized  / TOTAL_INITIAL * 100;
  const unrPct     = totalUnrealized / TOTAL_INITIAL * 100;
  const winRate    = totalTrades > 0 ? (totalWins / totalTrades * 100) : null;
  return { totalCurrent, realized, totalUnrealized, combined, returnPct, realPct, unrPct, totalTrades, winRate, openPos };
}

function renderOverview(ov) {
  const sign = v => v >= 0 ? "+" : "";
  const cls  = v => v >= 0 ? "var(--green)" : "var(--red)";
  const fmt  = v => `${sign(v)}$${Math.abs(v).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})}${v>=0?"":""}` ;
  const fmtP = v => `${sign(v)}${v.toFixed(2)}%`;

  const capEl = document.getElementById("ov-capital");
  capEl.textContent = "$" + ov.totalCurrent.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById("ov-capital-sub").textContent =
    "Initial $" + TOTAL_INITIAL.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});

  const realEl = document.getElementById("ov-realized");
  realEl.textContent = (ov.realized >= 0 ? "+" : "") + "$" + ov.realized.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
  realEl.style.color = cls(ov.realized);
  document.getElementById("ov-realized-sub").textContent = fmtP(ov.realPct);
  document.getElementById("ov-realized-sub").style.color = cls(ov.realized);

  const unrEl = document.getElementById("ov-unrealized");
  unrEl.textContent = (ov.totalUnrealized >= 0 ? "+" : "") + "$" + ov.totalUnrealized.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
  unrEl.style.color = cls(ov.totalUnrealized);
  document.getElementById("ov-unrealized-sub").textContent = fmtP(ov.unrPct);
  document.getElementById("ov-unrealized-sub").style.color = cls(ov.totalUnrealized);

  const retEl = document.getElementById("ov-return");
  retEl.textContent = fmtP(ov.returnPct);
  retEl.style.color = cls(ov.returnPct);
  document.getElementById("ov-return-sub").textContent = (ov.combined >= 0 ? "+" : "") + "$" + ov.combined.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById("ov-return-sub").style.color = cls(ov.combined);

  document.getElementById("ov-pos").textContent = ov.openPos;
  document.getElementById("ov-trades").textContent = ov.totalTrades;
  const wrEl = document.getElementById("ov-winrate");
  wrEl.textContent = ov.winRate != null ? `Win rate ${ov.winRate.toFixed(1)}%` : "";
}

/* ── helpers ── */
function retClass(v) {
  if (v > 0) return "pos";
  if (v < 0) return "neg";
  return "zero";
}
function retStr(v) {
  return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
}
function fmtCap(v) {
  return "$" + v.toLocaleString("en", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtPnl(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  const cls = n >= 0 ? "pnl-pos" : "pnl-neg";
  const s   = (n >= 0 ? "+" : "") + n.toFixed(2);
  return `<span class="${cls}">${s}</span>`;
}
function dirBadge(d) {
  if (!d) return `<span class="badge badge-flat">flat</span>`;
  if (d === "long")  return `<span class="badge badge-long">long</span>`;
  return `<span class="badge badge-short">short</span>`;
}

/* ── Summary render ── */
function renderSummary(data) {
  const grid = document.getElementById("strategy-grid");
  grid.innerHTML = "";

  STRATEGIES.forEach(strat => {
    const s = data[strat];
    if (!s) return;

    const hasPos = s.open_positions > 0;
    const retCls = retClass(s.total_return_pct);

    const coinRows = COINS.map(coin => {
      const c = s.coins[coin] || {};
      const ret = c.return_pct ?? 0;
      const upnl = c.unrealized_pnl;
      const upnlHtml = upnl != null
        ? `<span class="${upnl >= 0 ? 'pos' : 'neg'}">${upnl >= 0 ? '+' : ''}${upnl.toFixed(2)}</span><br><span style="font-size:11px;color:var(--muted)">${c.unrealized_pct >= 0 ? '+' : ''}${c.unrealized_pct}%</span>`
        : `<span style="color:var(--muted)">—</span>`;
      return `<tr>
        <td><span class="coin-name">
          <span style="color:${COIN_COLORS[coin]};font-size:12px">●</span>
          ${coin.toUpperCase()}
          ${dirBadge(c.direction)}
        </span></td>
        <td>${fmtCap(c.capital ?? 10000)}</td>
        <td class="${retClass(ret)}">${retStr(ret)}</td>
        <td data-upnl="${strat}-${coin}"
            data-entry="${c.entry_price || 0}"
            data-notional="${c.notional || 0}"
            data-direction="${c.direction || ''}"
            data-capital="${c.capital || 10000}">${upnlHtml}</td>
        <td>${c.total_trades ?? 0}</td>
        <td>${c.win_rate != null ? c.win_rate + "%" : "—"}</td>
        <td style="color:var(--muted);font-size:12px">${c.entry_price ? c.entry_price.toLocaleString() : "—"}</td>
        <td data-curprice="${strat}-${coin}" style="font-size:12px">—</td>
      </tr>`;
    }).join("");

    const signalHtml = s.signals.length
      ? `<div class="signals-row">${s.signals.map(sig =>
          `<span class="sig-chip">${sig.coin.toUpperCase()} ${sig.close.toLocaleString()} ${sig.detail}</span>`
        ).join("")}</div>`
      : "";

    const nextMin = s.next_cycle_in?.minutes;
    const nextAt  = s.next_cycle_in?.at;

    const card = document.createElement("div");
    card.className = "strategy-card" + (hasPos ? " has-position" : "");
    card.innerHTML = `
      <div class="card-header">
        <span class="strategy-name">${strat}</span>
        <div class="card-meta">
          <span class="total-cap">${fmtCap(s.total_capital)}</span>
          <span class="total-ret ${retCls}">${retStr(s.total_return_pct)}</span>
        </div>
      </div>
      <div class="card-body">
        <table class="coin-table">
          <thead><tr>
            <th>Coin</th><th>Capital</th><th>Return</th><th>Unrealised</th><th>Trades</th><th>Win%</th><th>Entry</th><th>Price</th>
          </tr></thead>
          <tbody>${coinRows}</tbody>
        </table>
        <div class="cycle-info">
          <span>Last cycle <b>${s.last_cycle ?? "—"}</b></span>
          ${nextMin != null ? `<span>Next in <b>${nextMin.toFixed(1)} min</b> (${nextAt})</span>` : ""}
          <span>Positions <b>${s.open_positions}</b></span>
        </div>
        ${signalHtml}
      </div>`;
    grid.appendChild(card);
  });
  updateChartPositions();
}

/* ── Trades render ── */
async function loadTrades(strategy) {
  const body = document.getElementById("trades-body");
  body.innerHTML = `<p class="empty-msg">Loading…</p>`;
  const res = await fetch(`/api/trades/${strategy}`);
  const rows = await res.json();
  if (!rows.length) {
    body.innerHTML = `<p class="empty-msg">No trades yet</p>`;
    return;
  }
  const cards = rows.map(r => {
    const pnl = parseFloat(r.pnl_usdt ?? r.pnl ?? 0);
    const pnlCls = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const pnlStr = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);
    const coin   = (r.coin ?? r.symbol ?? '').toUpperCase();
    const dir    = r.direction ?? r.side ?? '';
    const dirCls = dir === 'long' ? 'badge-long' : dir === 'short' ? 'badge-short' : 'badge-flat';
    const entry  = parseFloat(r.entry_price ?? 0).toLocaleString('en', {maximumFractionDigits: 2});
    const exit_p = parseFloat(r.exit_price ?? 0).toLocaleString('en', {maximumFractionDigits: 2});
    const size   = parseFloat(r.notional ?? 0).toFixed(2);
    const ts     = r.timestamp ?? r.time ?? '';
    return `
    <div class="trade-card">
      <div class="trade-card-top">
        <span class="trade-card-coin">
          ${coin ? `<span style="color:${COIN_COLORS[coin.toLowerCase()]||'var(--text)'};font-size:11px">●</span>${coin}` : '—'}
          <span class="badge ${dirCls}">${dir || 'flat'}</span>
        </span>
        <span class="trade-card-pnl ${pnlCls}">${pnlStr}</span>
      </div>
      <div class="trade-card-meta">
        <span><b>Entry</b> ${entry}</span>
        <span><b>Exit</b> ${exit_p}</span>
        <span><b>Size</b> $${size}</span>
      </div>
      <div class="trade-card-time">${ts}</div>
    </div>`;
  }).join('');
  body.innerHTML = `<div class="trade-list">${cards}</div>`;
}

function renderTabs() {
  const tabs = document.getElementById("trade-tabs");
  tabs.innerHTML = STRATEGIES.map(s =>
    `<button class="tab ${s === activeTab ? 'active' : ''}" data-s="${s}">${s}</button>`
  ).join("");
  tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.s;
      renderTabs();
      loadTrades(activeTab);
    });
  });
}

/* ── Main loop ── */
async function refresh() {
  try {
    const res = await fetch("/api/summary");
    summaryCache = await res.json();
    renderSummary(summaryCache);
    document.getElementById("last-updated").textContent =
      new Date().toLocaleTimeString("en");
    renderOverview(computeOverview(summaryCache, pricesCache));
    await refreshPrices();
  } catch(e) {
    console.error("fetch error", e);
  }
}

/* ── Real-time price + cycle detection (every 10s) ── */
async function refreshPrices() {
  try {
    const res = await fetch("/api/prices");
    const prices = await res.json();
    pricesCache = prices;
    renderOverview(computeOverview(summaryCache, prices));
    updateChartPrice();
    document.querySelectorAll("[data-upnl]").forEach(td => {
      const entry     = parseFloat(td.dataset.entry);
      const notional  = parseFloat(td.dataset.notional);
      const direction = td.dataset.direction;
      const capital   = parseFloat(td.dataset.capital);
      const key       = td.dataset.upnl.split("-")[1];
      const cur       = prices[key];
      // update current price cell
      const curTd = document.querySelector(`[data-curprice="${td.dataset.upnl}"]`);
      if (curTd) curTd.textContent = cur ? cur.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
      if (!cur || !entry || !direction) { return; }
      const priceChg = (cur - entry) / entry;
      const upnl     = notional * priceChg * (direction === "long" ? 1 : -1);
      const upct     = upnl / capital * 100;
      td.innerHTML    = `<span class="${upnl >= 0 ? 'pos' : 'neg'}">${upnl >= 0 ? '+' : ''}${upnl.toFixed(2)}</span><br><span style="font-size:11px;color:var(--muted)">${upct >= 0 ? '+' : ''}${upct.toFixed(2)}%</span>`;
    });
  } catch(e) {
    console.error("price fetch error", e);
  }

  // Detect if any strategy has a new cycle — if so, do full refresh
  try {
    const res2 = await fetch("/api/summary");
    const fresh = await res2.json();
    const cycleKey = STRATEGIES.map(s => fresh[s]?.last_cycle).join("|");
    if (cycleKey !== lastCycleKey) {
      lastCycleKey = cycleKey;
      summaryCache = fresh;
      renderSummary(fresh);
      renderOverview(computeOverview(fresh, prices));
      document.getElementById("last-updated").textContent =
        new Date().toLocaleTimeString("en") + " ✓new cycle";
      // re-run price overlay immediately after re-render
      await refreshPricesOnly(prices);
    }
  } catch(e) { /* ignore */ }
}

async function refreshPricesOnly(prices) {
  document.querySelectorAll("[data-upnl]").forEach(td => {
    const entry     = parseFloat(td.dataset.entry);
    const notional  = parseFloat(td.dataset.notional);
    const direction = td.dataset.direction;
    const capital   = parseFloat(td.dataset.capital);
    const key       = td.dataset.upnl.split("-")[1];
    const cur       = prices[key];
    const curTd = document.querySelector(`[data-curprice="${td.dataset.upnl}"]`);
    if (curTd) curTd.textContent = cur ? cur.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
    if (!cur || !entry || !direction) { return; }
    const priceChg = (cur - entry) / entry;
    const upnl     = notional * priceChg * (direction === "long" ? 1 : -1);
    const upct     = upnl / capital * 100;
    td.innerHTML    = `<span class="${upnl >= 0 ? 'pos' : 'neg'}">${upnl >= 0 ? '+' : ''}${upnl.toFixed(2)}</span><br><span style="font-size:11px;color:var(--muted)">${upct >= 0 ? '+' : ''}${upct.toFixed(2)}%</span>`;
  });
}

/* ── BTC 1H Candlestick Chart ── */
function initChart() {
  const container = document.getElementById('btc-chart-container');
  _chart = LightweightCharts.createChart(container, {
    height: 360,
    layout: { background: { color: '#161b22' }, textColor: '#e6edf3' },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false },
    handleScroll: true, handleScale: true,
  });
  _candleSeries = _chart.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950', wickDownColor: '#f85149',
  });
  _volSeries = _chart.addHistogramSeries({
    priceFormat: { type: 'volume' }, priceScaleId: 'vol',
    scaleMargins: { top: 0.82, bottom: 0 },
  });
  _chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
  new ResizeObserver(() => {
    if (_chart) _chart.applyOptions({ width: container.offsetWidth });
  }).observe(container);
}

async function loadCandles(coin) {
  coin = coin || _activeChartCoin;
  try {
    const res = await fetch(`/api/candles/${coin}`);
    const candles = await res.json();
    if (!candles.length) return;
    _candleSeries.setData(candles.map(c => ({ time: c.time, open: c.open, high: c.high, low: c.low, close: c.close })));
    _volSeries.setData(candles.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? 'rgba(63,185,80,0.35)' : 'rgba(248,81,73,0.35)',
    })));
    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const chg  = (last.close - prev.close) / prev.close * 100;
    const fmt  = v => v.toLocaleString('en', { maximumFractionDigits: 2 });
    document.getElementById('chart-open').textContent  = fmt(last.open);
    document.getElementById('chart-high').textContent  = fmt(last.high);
    document.getElementById('chart-low').textContent   = fmt(last.low);
    document.getElementById('chart-close').textContent = fmt(last.close);
    const chgEl = document.getElementById('chart-change');
    chgEl.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    chgEl.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('chart-title').textContent = coin.toUpperCase() + ' / USDT \u00b7 1H';
    _chart.timeScale().fitContent();
  } catch(e) { console.error('candle error', e); }
}

function updateChartPrice() {
  const p = pricesCache[_activeChartCoin];
  const el = document.getElementById('chart-live-price');
  if (el && p != null) {
    el.textContent = '$' + p.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
}

function updateChartPositions() {
  if (!_candleSeries) return;
  _priceLines.forEach(pl => { try { _candleSeries.removePriceLine(pl); } catch(e) {} });
  _priceLines = [];
  const coin = _activeChartCoin;
  STRATEGIES.forEach(strat => {
    const s = summaryCache[strat]; if (!s) return;
    const c = s.coins[coin] || {}; if (!c.direction) return;
    const add = (price, color, title) => price && _priceLines.push(
      _candleSeries.createPriceLine({ price, color, lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title })
    );
    add(c.entry_price, '#58a6ff', strat + ' entry');
    add(c.sl_price,    '#f85149', strat + ' SL');
    add(c.tp_price,    '#3fb950', strat + ' TP');
  });
}

/* ── Drawer ── */
function toggleDrawer() {
  const open = document.getElementById('trades-drawer').classList.contains('open');
  open ? closeDrawer() : openDrawer();
}
function openDrawer() {
  document.getElementById('trades-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('visible');
  document.getElementById('drawer-btn').classList.add('open');
}
function closeDrawer() {
  document.getElementById('trades-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('visible');
  document.getElementById('drawer-btn').classList.remove('open');
}

initChart();
loadCandles('btc');
setInterval(() => loadCandles(_activeChartCoin), 60000);

// Chart coin tab switching
document.getElementById('chart-coin-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.chart-tab');
  if (!btn) return;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _activeChartCoin = btn.dataset.coin;
  loadCandles(_activeChartCoin);
  updateChartPrice();
  updateChartPositions();
});

renderTabs();
loadTrades(activeTab);
refresh();
setInterval(refreshPrices, 2000);
</script>
